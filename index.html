<style>
  :root{
    --paper:#f6f5f1; --ink:#1b1b18; --muted:#6c6a61;

  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html{ scroll-behavior:smooth; }
  body{ background:var(--paper); color:var(--ink); font-family:"Inter",system-ui,sans-serif; line-height:1.65; font-size:17px; -webkit-font-smoothing:antialiased; }
  a{ color:var(--accent); text-decoration:none; }
  a:hover{ color:var(--accent-2); text-decoration:underline; text-underline-offset:3px; }

  .topbar{ position:sticky; top:0; z-index:10; background:color-mix(in srgb, var(--paper) 88%, transparent); backdrop-filter:saturate(120%) blur(8px); border-bottom:1px solid var(--rule); }
  .topbar .inner{ max-width:var(--maxw); margin:0 auto; padding:13px 24px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
  .brand{ font-family:"Newsreader",serif; font-weight:500; font-size:17px; }
  .nav{ display:flex; gap:16px; flex-wrap:wrap; }
  .nav a{ color:var(--muted); font-size:13px; }
  .nav a:hover{ color:var(--ink); text-decoration:none; }

  .site-main{ max-width:var(--maxw); margin:0 auto; padding:0 24px; }
  .sec{ padding:46px 0; border-top:1px solid var(--rule); }
  .eyebrow{ font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--accent); margin-bottom:18px; font-weight:600; }
  .reveal{ opacity:0; transform:translateY(16px); transition:opacity .6s ease, transform .6s ease; }
  .reveal.in{ opacity:1; transform:none; }

  .hero{ max-width:var(--maxw); margin:0 auto; padding:74px 24px 50px; }
  .hero .kicker{ font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--accent); font-weight:600; margin-bottom:20px; }
  .hero h1{ font-family:"Newsreader",serif; font-weight:400; font-size:clamp(40px,8.5vw,68px); line-height:1.03; letter-spacing:-.015em; margin-bottom:10px; }
  .hero .creds{ font-size:12.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:14px; }
  .hero .role{ font-family:"Newsreader",serif; font-style:italic; font-size:clamp(19px,4.5vw,23px); margin-bottom:4px; }
  .hero .affil{ color:var(--muted); font-size:16px; margin-bottom:26px; }
  .hero .tagline{ font-size:clamp(17px,4vw,20px); max-width:36ch; margin-bottom:30px; }
  .contacts{ display:flex; flex-wrap:wrap; gap:10px; }
  .contacts a{ font-size:13px; padding:7px 13px; border:1px solid var(--rule-2); border-radius:999px; color:var(--ink); transition:border-color .2s, background .2s; }
  .contacts a:hover{ text-decoration:none; border-color:var(--accent); background:rgba(40,84,80,.06); color:var(--accent); }

  .about p{ margin-bottom:14px; }
  .about p:last-child{ margin-bottom:0; }
  .themes{ display:grid; gap:24px; }
  .theme h3{ font-family:"Newsreader",serif; font-weight:500; font-size:21px; margin-bottom:4px; }
  .theme p{ color:var(--muted); font-size:16px; }

  /* collapsible entries with photo strips */
  .entry{ border-bottom:1px solid var(--rule); }
  .entry-head{ width:100%; background:none; border:none; font:inherit; color:inherit; cursor:default; display:flex; align-items:center; justify-content:space-between; gap:14px; padding:18px 0; text-align:left; }
  button.entry-head{ cursor:pointer; }
  button.entry-head:hover .entry-title{ color:var(--accent); }
  .entry-title{ font-family:"Newsreader",serif; font-weight:500; font-size:20px; transition:color .15s; }
  .entry-right{ display:flex; align-items:center; gap:12px; color:var(--accent); font-size:13px; white-space:nowrap; }
  .chev{ display:inline-block; transition:transform .25s ease; font-size:11px; }
  .entry.open .chev{ transform:rotate(90deg); }
  .entry-panel{ display:grid; grid-template-rows:0fr; transition:grid-template-rows .3s ease; }
  .entry.open .entry-panel{ grid-template-rows:1fr; }
  .entry-panel-inner{ overflow:hidden; min-height:0; }
  .entry-detail{ color:var(--muted); font-size:16px; padding-bottom:6px; }
  .strip{ display:flex; gap:10px; overflow-x:auto; padding:8px 2px 16px; scroll-snap-type:x mandatory; }
  .strip img{ height:190px; width:auto; max-width:80vw; border-radius:10px; border:1px solid var(--rule); object-fit:cover; flex:0 0 auto; scroll-snap-align:start; cursor:zoom-in; background:#eceae3; }
  .entry-link{ display:inline-block; margin-bottom:16px; font-size:13px; }

  .lightbox{ position:fixed; inset:0; z-index:100; background:rgba(20,16,24,.92); display:flex; align-items:center; justify-content:center; padding:24px; }
  .lightbox[hidden]{ display:none; }
  .lb-img{ max-width:92vw; max-height:88vh; border-radius:8px; }
  .lb-close{ position:absolute; top:14px; right:20px; background:none; border:none; color:#fff; font-size:34px; line-height:1; cursor:pointer; }

  .pub{ display:grid; grid-template-columns:54px 1fr; gap:14px; padding:16px 0; border-bottom:1px solid var(--rule); }
  .pub:last-child{ border-bottom:none; }
  .pub .yr{ font-family:"Newsreader",serif; font-size:18px; color:var(--accent); padding-top:1px; }

  .pub strong{ color:var(--ink); font-weight:600; }
  .pub .pl{ margin-top:5px; display:flex; gap:14px; flex-wrap:wrap; }
  .pub .pl a{ font-size:13px; }

  .cv-row{ display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
  .cv-note{ color:var(--muted); font-size:16px; flex:1; min-width:200px; }
  .btn{ font-family:inherit; font-size:14px; font-weight:600; color:#fff; background:var(--accent); border:none; border-radius:8px; padding:11px 18px; cursor:pointer; display:inline-block; }
  .btn:hover{ background:var(--accent-2); text-decoration:none; color:#fff; }

  .site-footer{ max-width:var(--maxw); margin:0 auto; padding:40px 24px 70px; border-top:1px solid var(--rule); color:var(--muted); font-size:14px; display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px; }
  .site-footer .fl{ display:flex; gap:16px; flex-wrap:wrap; }

  @media (max-width:520px){ .pub{ grid-template-columns:1fr; gap:4px; } .pub .yr{ font-size:14px; } }
  @media (prefers-reduced-motion: reduce){ *{ animation:none !important; transition:none !important; } .reveal{ opacity:1; transform:none; } }
  :focus-visible{ outline:2px solid var(--accent); outline-offset:3px; border-radius:3px; }

  body.building #site .reveal{ opacity:1; transform:none; }
  body.building #site .topbar{ position:static; }

  .e-bar{ position:sticky; top:0; z-index:50; background:#1b1b18; color:#f6f5f1; display:flex; align-items:center; gap:12px; padding:10px 16px; flex-wrap:wrap; }
  .e-title{ font-family:"Newsreader",serif; font-size:16px; margin-right:auto; }
  .e-tabs{ display:flex; gap:3px; background:#2a2a26; border-radius:8px; padding:3px; }
  .e-tab{ background:transparent; color:#cfcabb; border:none; padding:6px 14px; border-radius:6px; font-family:inherit; font-size:13px; cursor:pointer; }
  .e-tab.active{ background:#f6f5f1; color:#1b1b18; }
  .e-btn{ font-family:inherit; font-size:13px; font-weight:600; border-radius:7px; padding:7px 14px; cursor:pointer; border:1px solid #4a4a44; background:transparent; color:#f6f5f1; }
  .e-primary{ background:#3a716b; border-color:#3a716b; color:#fff; }

  #editor{ max-width:680px; margin:0 auto; padding:24px 24px 90px; }
  .e-intro{ color:var(--muted); font-size:14px; margin-bottom:18px; }
  .e-h{ font-family:"Newsreader",serif; font-size:20px; margin:28px 0 6px; padding-bottom:6px; border-bottom:1px solid var(--rule); }
  .e-sub{ font-size:12.5px; color:var(--muted); margin:2px 0 6px; }
  label.e-l{ display:block; font-size:12px; letter-spacing:.06em; text-transform:uppercase; color:var(--accent); margin:13px 0 5px; font-weight:600; }
  .e-in, .e-ta{ width:100%; background:#fff; border:1px solid var(--rule-2); border-radius:8px; padding:9px 11px; font-family:inherit; font-size:15px; color:var(--ink); }
  .e-ta{ min-height:74px; resize:vertical; }
  .e-in:focus, .e-ta:focus{ outline:none; border-color:var(--accent); }
  .e-row2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .e-card{ border:1px solid var(--rule); border-radius:10px; padding:14px 14px 6px; margin:12px 0; position:relative; background:#fbfaf7; }
  .e-rm{ position:absolute; top:8px; right:10px; background:none; border:none; color:var(--muted); font-size:19px; line-height:1; cursor:pointer; }
  .e-rm:hover{ color:#a23a2a; }
  .e-add{ width:100%; padding:10px; border:1px dashed var(--rule-2); background:transparent; color:var(--accent); border-radius:8px; cursor:pointer; font-family:inherit; font-size:14px; margin:6px 0 4px; }
  .e-add:hover{ border-color:var(--accent); background:rgba(40,84,80,.05); }
  .e-hint{ font-size:12.5px; color:var(--muted); margin-top:5px; }
  .e-link-row{ display:grid; grid-template-columns:120px 1fr; gap:8px; margin-bottom:8px; }
  #publish-out{ margin-top:22px; padding-top:18px; border-top:1px solid var(--rule); }
  .e-out-ta{ width:100%; min-height:90px; font-family:ui-monospace,Menlo,monospace; font-size:12px; background:#fff; border:1px solid var(--rule-2); border-radius:8px; padding:10px; color:var(--ink); }
  .e-reset{ background:none; border:none; color:var(--muted); font-size:12px; text-decoration:underline; cursor:pointer; margin-top:14px; }
  @media (max-width:520px){ .e-row2{ grid-template-columns:1fr; } .e-link-row{ grid-template-columns:90px 1fr; } }
</style>
</head>

<script>
function esc(s){ return (s||"").replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
function ensureLightbox(){
  if(document.getElementById("lightbox")) return;
  var lb=document.createElement("div"); lb.id="lightbox"; lb.className="lightbox"; lb.setAttribute("hidden","");
  lb.innerHTML='<button class="lb-close" type="button" aria-label="Close">×</button><img class="lb-img" alt="">';
  document.body.appendChild(lb);
  function close(){ lb.setAttribute("hidden",""); }
  lb.addEventListener("click",function(e){ if(e.target===lb || e.target.classList.contains("lb-close")) close(); });
  document.addEventListener("keydown",function(e){ if(e.key==="Escape") close(); });
}
function openLightbox(src,alt){ ensureLightbox(); var lb=document.getElementById("lightbox"); var im=lb.querySelector(".lb-img"); im.src=src; im.alt=alt||""; lb.removeAttribute("hidden"); }

    L.scholar?{label:"Google Scholar",href:L.scholar}:null,

        var panel=document.createElement("div"); panel.className="entry-panel";
        var inner=document.createElement("div"); inner.className="entry-panel-inner";
        if(it.detail){ var p=document.createElement("p"); p.className="entry-detail"; p.textContent=it.detail; inner.appendChild(p); }
        if(imgs.length){ var strip=document.createElement("div"); strip.className="strip";
          imgs.forEach(function(src){ var im=document.createElement("img"); im.src=src; im.alt=it.title||""; im.loading="lazy"; im.onerror=function(){ this.style.display="none"; }; im.addEventListener("click",function(){ openLightbox(src,it.title); }); strip.appendChild(im); });
          inner.appendChild(strip);
        }
        if(it.link&&it.link.url){ var a=document.createElement("a"); a.className="entry-link"; a.href=it.link.url; a.textContent=it.link.label||"Link"; if(it.link.url.indexOf("http")===0){a.target="_blank";a.rel="noopener";} inner.appendChild(a); }
        panel.appendChild(inner); entry.appendChild(panel);
        head.addEventListener("click",function(){ var open=entry.classList.toggle("open"); head.setAttribute("aria-expanded", open?"true":"false"); });
      }
      w.appendChild(entry);
    });
    var sec=document.getElementById(sectionId); if(sec) sec.style.display=items.length?"":"none";
  }
  renderEntries("awards-list", DATA.awards, "awards");
  renderEntries("conf-list", DATA.conferences, "conf");
  renderEntries("eng-list", DATA.engagement, "eng");

  var pl=document.getElementById("pub-list"); if(pl){ pl.innerHTML=""; var bold=DATA.boldName?esc(DATA.boldName):null;
    (DATA.publications||[]).forEach(function(pub){
      var row=document.createElement("div"); row.className="pub";
      var yr=document.createElement("div"); yr.className="yr"; yr.textContent=pub.year;
      var body=document.createElement("div");
      var ah=esc(pub.authors); if(bold) ah=ah.split(bold).join("<strong>"+bold+"</strong>");
      body.innerHTML='<div class="auth">'+ah+'</div><div class="ttl">'+esc(pub.title)+'</div><div class="ven">'+esc(pub.venue)+'</div>';
      if(pub.links && pub.links.length){ var lw=document.createElement("div"); lw.className="pl";
        pub.links.forEach(function(lk){ if(!lk||!lk.url)return; var a=document.createElement("a"); a.href=lk.url; a.textContent=lk.label||"Link"; if(lk.url.indexOf("http")===0){a.target="_blank";a.rel="noopener";} lw.appendChild(a); });
        body.appendChild(lw);
      }
      row.appendChild(yr); row.appendChild(body); pl.appendChild(row);
    });
    var psec=document.getElementById("pubs"); if(psec) psec.style.display=(DATA.publications&&DATA.publications.length)?"":"none";
  }

  var cvNote=document.getElementById("cv-note"); if(cvNote) cvNote.textContent=(DATA.cv&&DATA.cv.note)||"";
  var cv=document.getElementById("cv-link"); if(cv){ if(DATA.cv&&DATA.cv.url&&DATA.cv.url!=="#"){ cv.href=DATA.cv.url; cv.style.display=""; } else { cv.style.display="none"; } }
  var fn=document.getElementById("foot-name"); if(fn) fn.textContent="© "+new Date().getFullYear()+" "+(DATA.shortName||DATA.name||"");

  if(!window.__revealInit){ window.__revealInit=true;
    var io=new IntersectionObserver(function(es){ es.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add("in"); io.unobserve(e.target);} }); },{threshold:0.12});
    document.querySelectorAll("#site .reveal").forEach(function(el){ io.observe(el); });
  }
}
(function(){
  function boot(){ if(typeof DATA!=="undefined" && DATA) render(DATA); }
  if(document.readyState!=="loading") boot(); else document.addEventListener("DOMContentLoaded",boot);
})();
</script>
