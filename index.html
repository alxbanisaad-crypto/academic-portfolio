<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Dr. Rand Abdulhussain — Pharmaceutical Scientist"/>
<title>Dr. Rand Abdulhussain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f6f5f1; --ink:#1b1b18; --muted:#6c6a61;
    --accent:#285450; --accent-2:#3a716b; --rule:#e1ddd2; --rule-2:#cfcabb; --maxw:1080px; --readw:680px;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html{ scroll-behavior:smooth; }
  body{ background:var(--paper); color:var(--ink); font-family:"Inter",system-ui,sans-serif; line-height:1.65; font-size:17px; -webkit-font-smoothing:antialiased; }
  a{ color:var(--accent); text-decoration:none; }
  a:hover{ color:var(--accent-2); text-decoration:underline; text-underline-offset:3px; }

  .topbar{ position:sticky; top:0; z-index:10; background:color-mix(in srgb, var(--paper) 88%, transparent); backdrop-filter:saturate(120%) blur(8px); border-bottom:1px solid var(--rule); }
  .topbar .inner{ max-width:var(--maxw); margin:0 auto; padding:13px 24px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
  .brand{ font-family:"Newsreader",serif; font-weight:500; font-size:17px; }
  .nav{ display:flex; gap:16px; flex-wrap:wrap; }
  .nav a{ color:var(--muted); font-size:13px; }
  .nav a:hover{ color:var(--ink); text-decoration:none; }

  .site-main{ max-width:var(--maxw); margin:0 auto; padding:0 24px; }
  .sec{ padding:46px 0; border-top:1px solid var(--rule); }
  .eyebrow{ font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--accent); margin-bottom:18px; font-weight:600; }
  .reveal{ opacity:0; transform:translateY(16px); transition:opacity .6s ease, transform .6s ease; }
  .reveal.in{ opacity:1; transform:none; }

  .hero{ max-width:var(--maxw); margin:0 auto; padding:74px 24px 50px; }
  .hero .kicker{ font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--accent); font-weight:600; margin-bottom:20px; }
  .hero h1{ font-family:"Newsreader",serif; font-weight:400; font-size:clamp(40px,8.5vw,68px); line-height:1.03; letter-spacing:-.015em; margin-bottom:10px; }
  .hero .creds{ font-size:12.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:14px; }
  .hero .role{ font-family:"Newsreader",serif; font-style:italic; font-size:clamp(19px,4.5vw,23px); margin-bottom:4px; }
  .hero .affil{ color:var(--muted); font-size:16px; margin-bottom:26px; }
  .hero .tagline{ font-size:clamp(17px,4vw,20px); max-width:36ch; margin-bottom:30px; }
  .contacts{ display:flex; flex-wrap:wrap; gap:10px; }
  .contacts a{ font-size:13px; padding:7px 13px; border:1px solid var(--rule-2); border-radius:999px; color:var(--ink); transition:border-color .2s, background .2s; }
  .contacts a:hover{ text-decoration:none; border-color:var(--accent); background:rgba(40,84,80,.06); color:var(--accent); }

  .about p{ margin-bottom:14px; max-width:var(--readw); }
  .about p:last-child{ margin-bottom:0; }
  .themes{ display:grid; gap:24px; }
  .theme h3{ font-family:"Newsreader",serif; font-weight:500; font-size:21px; margin-bottom:4px; }
  .theme p{ color:var(--muted); font-size:16px; }

  /* expanding research panels (hover to open) */
  .rpanels{ display:flex; gap:8px; height:400px; }
  .rpanel{ position:relative; flex:1; min-width:0; height:100%; border-radius:14px; overflow:hidden; cursor:pointer; transition:flex .6s cubic-bezier(.2,.8,.2,1); }
  .rpanel.active{ flex:5.2; }
  .rbg{ position:absolute; inset:0; background-size:cover; background-position:center; transition:transform .7s ease; }
  .rpanel.active .rbg{ transform:scale(1.07); }
  .rscrim{ position:absolute; inset:0; background:rgba(15,12,16,.34); transition:background .4s ease; }
  .rpanel.active .rscrim{ background:rgba(15,12,16,.16); }
  .rvert{ position:absolute; left:50%; bottom:20px; transform:translateX(-50%) rotate(180deg); writing-mode:vertical-rl; color:#fff; font-family:"Newsreader",serif; font-size:18px; white-space:nowrap; opacity:.94; transition:opacity .3s ease; }
  .rpanel.active .rvert{ opacity:0; }
  .rnum{ position:absolute; top:14px; left:0; right:0; text-align:center; color:rgba(255,255,255,.7); font-size:12px; letter-spacing:.14em; transition:opacity .3s ease; }
  .rpanel.active .rnum{ opacity:0; }
  .rcontent{ position:absolute; left:0; right:0; bottom:0; padding:24px 26px; color:#fff; opacity:0; transform:translateY(12px); transition:opacity .5s ease .12s, transform .5s ease .12s; }
  .rpanel.active .rcontent{ opacity:1; transform:none; }
  .rtitle{ font-family:"Newsreader",serif; font-weight:500; font-size:26px; margin:0 0 6px; color:#fff; }
  .rtext{ font-size:14px; opacity:.9; margin:0; color:#fff; }
  .rhint{ text-align:center; color:var(--muted); font-size:13px; margin:14px 0 0; }
  @media (max-width:520px){ .rpanels{ height:340px; } .rpanel.active{ flex:4; } .rtitle{ font-size:22px; } }

  /* collapsible entries with photo strips */
  .entry{ border-bottom:1px solid var(--rule); }
  .entry-head{ width:100%; background:none; border:none; font:inherit; color:inherit; cursor:default; display:flex; align-items:center; justify-content:space-between; gap:14px; padding:18px 0; text-align:left; }
  button.entry-head{ cursor:pointer; }
  button.entry-head:hover .entry-title{ color:var(--accent); }
  .entry-title{ font-family:"Newsreader",serif; font-weight:500; font-size:20px; transition:color .15s; }
  .entry-right{ display:flex; align-items:center; gap:12px; color:var(--accent); font-size:13px; white-space:nowrap; }
  .chev{ display:inline-block; transition:transform .25s ease; font-size:11px; }
  .entry.open .chev{ transform:rotate(90deg); }
  .entry-panel{ display:grid; grid-template-rows:0fr; transition:grid-template-rows .3s ease; }
  .entry.open .entry-panel{ grid-template-rows:1fr; }
  .entry-panel-inner{ overflow:hidden; min-height:0; }
  .entry-detail{ color:var(--muted); font-size:16px; padding-bottom:6px; max-width:var(--readw); }
  .strip{ display:flex; gap:10px; overflow-x:auto; padding:8px 2px 16px; scroll-snap-type:x mandatory; }
  .strip img{ height:190px; width:auto; max-width:80vw; border-radius:10px; border:1px solid var(--rule); object-fit:cover; flex:0 0 auto; scroll-snap-align:start; cursor:zoom-in; background:#eceae3; }
  .entry-link{ display:inline-block; margin-bottom:16px; font-size:13px; }

  /* awards — black prize block, click to expand, moving photo backdrop */
  .awblk{ --acc:#e3c16f; --ivory:#f4efe4; --muted:rgba(244,239,228,.34); background:#0c0a0e; border-radius:16px; padding:18px; }
  .awrow{ display:flex; gap:10px; align-items:stretch; min-height:280px; transition:gap .4s ease; }
  .awrow.expanded{ height:600px; gap:0; }
  .awtab{ position:relative; flex:1; min-width:0; display:flex; border-radius:13px; overflow:hidden; cursor:pointer; background:#0c0a0e; border:1px solid rgba(255,255,255,.07); transition:flex .55s cubic-bezier(.2,.8,.2,1), opacity .35s ease; }
  .awtab.open{ flex:1000; cursor:default; }
  .awrow.expanded .awtab:not(.open){ flex:0; opacity:0; pointer-events:none; border:none; }
  .awbg{ position:absolute; inset:0; z-index:0; background-size:cover; background-position:center; }
  .awfx{ position:absolute; inset:0; z-index:1; background-size:cover; background-position:center; pointer-events:none; }
  .awscrim{ position:absolute; inset:0; z-index:2; background:var(--aw-scrim, rgba(10,8,12,.32)); }
  .awcol{ position:relative; z-index:3; flex:1; display:flex; align-items:center; justify-content:center; padding:52px 12px 28px; transition:opacity .25s ease; }
  /* heading backing is rendered as .awshade (editable in the builder) */
  .awyear-top{ position:absolute; top:14px; left:0; right:0; text-align:center; color:var(--acc); font-family:"Newsreader",serif; font-size:13px; padding:0 8px; line-height:1.3; text-shadow:0 1px 6px rgba(0,0,0,.7); }
  .awvert{ writing-mode:vertical-rl; transform:rotate(180deg); color:var(--ivory); font-family:"Newsreader",serif; font-size:16px; white-space:nowrap; text-shadow:0 2px 10px rgba(0,0,0,.5); }
  .awtab.open .awcol{ opacity:0; pointer-events:none; }
  .awdetail{ position:absolute; inset:0; z-index:4; opacity:0; pointer-events:none; background:radial-gradient(120% 90% at 16% 8%, rgba(255,255,255,.06), transparent 60%); transition:opacity .3s ease; }
  .awtab.open .awdetail{ opacity:1; pointer-events:auto; }
  .pstrip{ position:absolute; inset:0; overflow:hidden; z-index:0; }
  .ptrack{ display:flex; gap:8px; height:100%; width:max-content; }
  .pphoto{ flex:0 0 auto; width:clamp(260px,58vw,560px); height:100%; background-size:cover; background-position:center; }
  .pstill{ position:absolute; inset:0; z-index:0; background-size:cover; background-position:center; }
  .awfade{ position:absolute; inset:0; z-index:1; pointer-events:none; background:linear-gradient(180deg,#0c0a0e 0%,#0c0a0e 18%,rgba(12,10,14,.55) 32%,rgba(12,10,14,.12) 48%,rgba(12,10,14,0) 62%,rgba(12,10,14,0) 100%); }
  .awtext{ position:absolute; left:0; right:0; top:0; z-index:3; padding:30px 34px; }
  .awd-year{ color:var(--acc); font-family:"Newsreader",serif; font-size:15px; letter-spacing:.06em; margin:0 0 6px; }
  .awd-place{ color:rgba(244,239,228,.82); font-size:14px; margin:14px 0 0; }
  .awd-brief{ color:#d8d3c8; font-size:15px; line-height:1.55; margin:10px 0 0; max-width:64ch; display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden; }
  .parrow{ position:absolute; top:62%; transform:translateY(-50%); z-index:4; width:44px; height:44px; border-radius:50%; border:1.5px solid rgba(255,255,255,.55); background:rgba(8,6,10,.4); color:#fff; font-size:24px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .2s, border-color .2s; }
  .parrow:hover{ background:rgba(8,6,10,.75); border-color:var(--acc); }
  .pprev{ left:16px; } .pnext{ right:16px; }
  .awclose{ position:absolute; top:18px; right:20px; z-index:5; width:46px; height:46px; border-radius:50%; border:1.5px solid rgba(255,255,255,.55); background:rgba(8,6,10,.35); color:var(--ivory); font-size:24px; font-weight:300; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:transform .35s cubic-bezier(.2,.8,.2,1), border-color .25s, color .25s, background .25s; }
  .awclose:hover{ transform:rotate(90deg); border-color:var(--acc); color:var(--acc); background:rgba(8,6,10,.65); }
  .htitle{ font-family:"Newsreader",serif; font-size:31px; font-weight:500; line-height:1.1; display:inline-block; }
  .h-morph{ color:var(--acc); transform-origin:left center; opacity:0; transform:rotate(-87deg) translateY(34px) scale(.92); }
  .h-morph.play{ transition:transform .65s cubic-bezier(.2,.8,.2,1), opacity .5s ease; transform:none; opacity:1; }
  .h-letter{ color:var(--acc); }
  .h-letter .ch{ display:inline-block; opacity:0; transform:translateY(16px); }
  .h-letter.play .ch{ animation:awChIn .5s cubic-bezier(.2,.8,.2,1) forwards; animation-delay:calc(var(--i)*36ms); }
  @keyframes awChIn{ to{ opacity:1; transform:none; } }
  .h-word{ color:var(--ivory); }
  .h-word .wd{ display:inline-block; margin-right:.28em; opacity:0; }
  .h-word .wd.l{ transform:translateX(-46px); } .h-word .wd.r{ transform:translateX(46px); }
  .h-word.play .wd{ animation:awWdIn .55s cubic-bezier(.2,.8,.2,1) forwards; animation-delay:calc(var(--i)*95ms); }
  @keyframes awWdIn{ to{ opacity:1; transform:none; } }
  .h-sweep{ position:relative; color:var(--muted); }
  .h-sweep .fill{ position:absolute; left:0; top:0; white-space:nowrap; color:var(--acc); clip-path:inset(0 100% 0 0); }
  .h-sweep.play .fill{ transition:clip-path .85s cubic-bezier(.5,0,.1,1); clip-path:inset(0 0 0 0); }
  .h-sweep .ul{ position:absolute; left:0; bottom:-7px; height:2px; width:100%; background:var(--acc); transform:scaleX(0); transform-origin:left; }
  .h-sweep.play .ul{ transition:transform .7s ease .12s; transform:scaleX(1); }
  .h-out{ color:transparent; -webkit-text-stroke:1.4px var(--acc); transition:color .85s ease .18s; }
  .h-out.play{ color:var(--acc); }
  @media (max-width:560px){ .awrow.expanded{ height:500px; } .htitle{ font-size:25px; } .pphoto{ width:78vw; } }
  @media (prefers-reduced-motion: reduce){ .h-letter .ch, .h-word .wd, .h-morph{ opacity:1; transform:none; } .h-sweep{ color:var(--acc); } .h-sweep .fill{ clip-path:inset(0 0 0 0); } .h-out{ color:var(--acc); } }
  /* builder accent picker */
  .acc-edit{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-top:6px; }
  .acc-sw{ width:26px; height:26px; border-radius:50%; border:2px solid var(--rule-2); cursor:pointer; padding:0; }
  .acc-sw.on{ border-color:var(--ink); }
  .acc-hex{ width:108px !important; }
  .e-range{ width:100%; accent-color:var(--accent); margin-top:2px; }
  .e-val{ color:var(--accent); font-weight:600; }
  .e-seg{ display:flex; gap:6px; margin-top:6px; flex-wrap:wrap; }
  .e-tg{ font:inherit; font-size:12px; color:var(--ink); background:#fff; border:1px solid var(--rule-2); border-radius:8px; padding:6px 11px; cursor:pointer; }
  .e-tg.on{ background:var(--accent); color:#fff; border-color:var(--accent); font-weight:600; }

  .lightbox{ position:fixed; inset:0; z-index:100; background:rgba(20,16,24,.92); display:flex; align-items:center; justify-content:center; padding:24px; }
  .lightbox[hidden]{ display:none; }
  .lb-img{ max-width:92vw; max-height:88vh; border-radius:8px; }
  .lb-close{ position:absolute; top:14px; right:20px; background:none; border:none; color:#fff; font-size:34px; line-height:1; cursor:pointer; }

  .pub{ display:grid; grid-template-columns:54px 1fr; gap:14px; padding:16px 0; border-bottom:1px solid var(--rule); max-width:820px; }
  .pub:last-child{ border-bottom:none; }
  .pub .yr{ font-family:"Newsreader",serif; font-size:18px; color:var(--accent); padding-top:1px; }
  .pub .ttl{ font-weight:500; }
  .pub .auth, .pub .ven{ font-size:15px; color:var(--muted); }
  .pub .ven{ font-style:italic; }
  .pub strong{ color:var(--ink); font-weight:600; }
  .pub .pl{ margin-top:5px; display:flex; gap:14px; flex-wrap:wrap; }
  .pub .pl a{ font-size:13px; }

  .cv-row{ display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
  .cv-note{ color:var(--muted); font-size:16px; flex:1; min-width:200px; }
  .btn{ font-family:inherit; font-size:14px; font-weight:600; color:#fff; background:var(--accent); border:none; border-radius:8px; padding:11px 18px; cursor:pointer; display:inline-block; }
  .btn:hover{ background:var(--accent-2); text-decoration:none; color:#fff; }

  .site-footer{ max-width:var(--maxw); margin:0 auto; padding:40px 24px 70px; border-top:1px solid var(--rule); color:var(--muted); font-size:14px; display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px; }
  .site-footer .fl{ display:flex; gap:16px; flex-wrap:wrap; }

  @media (max-width:520px){ .pub{ grid-template-columns:1fr; gap:4px; } .pub .yr{ font-size:14px; } }
  @media (prefers-reduced-motion: reduce){ *{ animation:none !important; transition:none !important; } .reveal{ opacity:1; transform:none; } }
  :focus-visible{ outline:2px solid var(--accent); outline-offset:3px; border-radius:3px; }

  body.building #site .reveal{ opacity:1; transform:none; }
  body.building #site .topbar{ position:static; }

  /* builder chrome */
  .e-bar{ position:sticky; top:0; z-index:50; background:#1b1b18; color:#f6f5f1; display:flex; align-items:center; gap:12px; padding:10px 16px; flex-wrap:wrap; }
  .e-title{ font-family:"Newsreader",serif; font-size:16px; margin-right:auto; }
  .e-tabs{ display:flex; gap:3px; background:#2a2a26; border-radius:8px; padding:3px; }
  .e-tab{ background:transparent; color:#cfcabb; border:none; padding:6px 14px; border-radius:6px; font-family:inherit; font-size:13px; cursor:pointer; }
  .e-tab.active{ background:#f6f5f1; color:#1b1b18; }
  .e-btn{ font-family:inherit; font-size:13px; font-weight:600; border-radius:7px; padding:7px 14px; cursor:pointer; border:1px solid #4a4a44; background:transparent; color:#f6f5f1; }
  .e-primary{ background:#3a716b; border-color:#3a716b; color:#fff; }

  #editor{ max-width:680px; margin:0 auto; padding:24px 24px 90px; }
  .e-intro{ color:var(--muted); font-size:14px; margin-bottom:18px; }
  .e-h{ font-family:"Newsreader",serif; font-size:20px; margin:28px 0 6px; padding-bottom:6px; border-bottom:1px solid var(--rule); }
  .e-sub{ font-size:12.5px; color:var(--muted); margin:2px 0 6px; }
  label.e-l{ display:block; font-size:12px; letter-spacing:.06em; text-transform:uppercase; color:var(--accent); margin:13px 0 5px; font-weight:600; }
  .e-in, .e-ta{ width:100%; background:#fff; border:1px solid var(--rule-2); border-radius:8px; padding:9px 11px; font-family:inherit; font-size:15px; color:var(--ink); }
  .e-ta{ min-height:74px; resize:vertical; }
  .e-in:focus, .e-ta:focus{ outline:none; border-color:var(--accent); }
  .e-row2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .e-card{ border:1px solid var(--rule); border-radius:10px; padding:14px 14px 6px; margin:12px 0; position:relative; background:#fbfaf7; }
  .e-rm{ position:absolute; top:8px; right:10px; background:none; border:none; color:var(--muted); font-size:19px; line-height:1; cursor:pointer; }
  .e-rm:hover{ color:#a23a2a; }
  .e-add{ width:100%; padding:10px; border:1px dashed var(--rule-2); background:transparent; color:var(--accent); border-radius:8px; cursor:pointer; font-family:inherit; font-size:14px; margin:6px 0 4px; }
  .e-add:hover{ border-color:var(--accent); background:rgba(40,84,80,.05); }
  .e-hint{ font-size:12.5px; color:var(--muted); margin-top:5px; }
  .e-link-row{ display:grid; grid-template-columns:120px 1fr; gap:8px; margin-bottom:8px; }
  #publish-out{ margin-top:22px; padding-top:18px; border-top:1px solid var(--rule); }
  .e-out-ta{ width:100%; min-height:90px; font-family:ui-monospace,Menlo,monospace; font-size:12px; background:#fff; border:1px solid var(--rule-2); border-radius:8px; padding:10px; color:var(--ink); }
  .e-reset{ background:none; border:none; color:var(--muted); font-size:12px; text-decoration:underline; cursor:pointer; margin-top:14px; }
  @media (max-width:520px){ .e-row2{ grid-template-columns:1fr; } .e-link-row{ grid-template-columns:90px 1fr; } }
</style>
</head>
<body>
<div id="site"></div>
<template id="site-markup">
  <div class="topbar"><div class="inner">
    <span class="brand" id="brand"></span>
    <nav class="nav">
      <a href="#about">About</a><a href="#research">Research</a><a href="#awards">Awards</a>
      <a href="#pubs">Publications</a><a href="#conf">Talks</a><a href="#eng">Engagement</a>
      <a href="#cv">CV</a><a href="#contact">Contact</a>
    </nav>
  </div></div>

  <header class="hero">
    <p class="kicker" id="kicker"></p>
    <h1 id="name"></h1>
    <p class="creds" id="creds"></p>
    <p class="role" id="role"></p>
    <p class="affil" id="affil"></p>
    <p class="tagline" id="tagline"></p>
    <div class="contacts" id="contacts"></div>
  </header>

  <main class="site-main">
    <section class="sec about reveal" id="about"><p class="eyebrow">About</p><div id="about-body"></div></section>
    <section class="sec reveal" id="research"><p class="eyebrow">Research</p><div class="rpanels" id="themes"></div></section>
    <section class="sec reveal" id="awards"><p class="eyebrow">Awards &amp; honours</p><div class="awblk" id="awards-list"></div></section>
    <section class="sec reveal" id="pubs"><p class="eyebrow">Publications</p><div id="pub-list"></div></section>
    <section class="sec reveal" id="conf"><p class="eyebrow">Conferences &amp; talks</p><div id="conf-list"></div></section>
    <section class="sec reveal" id="eng"><p class="eyebrow">Engagement &amp; leadership</p><div id="eng-list"></div></section>
    <section class="sec reveal" id="cv"><p class="eyebrow">Curriculum vitae</p>
      <div class="cv-row"><span class="cv-note" id="cv-note"></span><a class="btn" id="cv-link" href="#">Download CV (PDF)</a></div>
    </section>
  </main>

  <footer class="site-footer" id="contact">
    <span id="foot-name"></span><span class="fl" id="foot-links"></span>
  </footer>
</template>

  }
  renderAwards(DATA);
  renderEntries("conf-list", DATA.conferences, "conf");
  renderEntries("eng-list", DATA.engagement, "eng");

  var pl=document.getElementById("pub-list"); if(pl){ pl.innerHTML=""; var bold=DATA.boldName?esc(DATA.boldName):null;
    (DATA.publications||[]).forEach(function(pub){
      var row=document.createElement("div"); row.className="pub";
      var yr=document.createElement("div"); yr.className="yr"; yr.textContent=pub.year;
      var body=document.createElement("div");
      var ah=esc(pub.authors); if(bold) ah=ah.split(bold).join("<strong>"+bold+"</strong>");
      body.innerHTML='<div class="auth">'+ah+'</div><div class="ttl">'+esc(pub.title)+'</div><div class="ven">'+esc(pub.venue)+'</div>';
      if(pub.links && pub.links.length){ var lw=document.createElement("div"); lw.className="pl";
        pub.links.forEach(function(lk){ if(!lk||!lk.url)return; var a=document.createElement("a"); a.href=lk.url; a.textContent=lk.label||"Link"; if(lk.url.indexOf("http")===0){a.target="_blank";a.rel="noopener";} lw.appendChild(a); });
        body.appendChild(lw);
      }
      row.appendChild(yr); row.appendChild(body); pl.appendChild(row);
    });
    var psec=document.getElementById("pubs"); if(psec) psec.style.display=(DATA.publications&&DATA.publications.length)?"":"none";
  }

  var cvNote=document.getElementById("cv-note"); if(cvNote) cvNote.textContent=(DATA.cv&&DATA.cv.note)||"";
  var cv=document.getElementById("cv-link"); if(cv){ if(DATA.cv&&DATA.cv.url&&DATA.cv.url!=="#"){ cv.href=DATA.cv.url; cv.style.display=""; } else { cv.style.display="none"; } }
  var fn=document.getElementById("foot-name"); if(fn) fn.textContent="© "+new Date().getFullYear()+" "+(DATA.shortName||DATA.name||"");

  if(!window.__revealInit){ window.__revealInit=true;
    var io=new IntersectionObserver(function(es){ es.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add("in"); io.unobserve(e.target);} }); },{threshold:0.12});
    document.querySelectorAll("#site .reveal").forEach(function(el){ io.observe(el); });
  }
}
(function(){
  function boot(){ if(typeof DATA!=="undefined" && DATA) render(DATA); }
  if(document.readyState!=="loading") boot(); else document.addEventListener("DOMContentLoaded",boot);
})();
</script>
</body>
</html>
